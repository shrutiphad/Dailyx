# Render blueprint. Deploys the API (web) + worker (background) + Postgres + Redis.
# The Next.js frontend deploys separately on Vercel (see README).
databases:
  - name: dailyx-db
    plan: free

services:
  - type: redis
    name: dailyx-redis
    plan: free
    ipAllowList: []

  - type: web
    name: dailyx-api
    runtime: node
    plan: free
    # Install pnpm via npm rather than corepack: Render's image ships a corepack
    # shim on a read-only path (EROFS on `corepack enable`), and corepack's bundled
    # signing keys are stale ("Cannot find matching keyid"). npm -g sidesteps both.
    buildCommand: npm i -g pnpm@9.6.0 && pnpm install --frozen-lockfile && pnpm --filter @dailyx/db generate && pnpm --filter @dailyx/db migrate:deploy && pnpm --filter @dailyx/api build
    startCommand: pnpm --filter @dailyx/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: dailyx-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: dailyx-redis, type: redis, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false   # set to your Vercel URL
      - key: API_PUBLIC_URL
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_FROM
        sync: false
      - key: MAILGUN_WEBHOOK_SIGNING_KEY
        sync: false
      - key: MAILGUN_BASE_URL
        value: https://api.mailgun.net   # use https://api.eu.mailgun.net for EU keys

  - type: worker
    name: dailyx-worker
    runtime: node
    plan: free
    buildCommand: npm i -g pnpm@9.6.0 && pnpm install --frozen-lockfile && pnpm --filter @dailyx/db generate && pnpm --filter @dailyx/api build
    startCommand: pnpm --filter @dailyx/api start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: dailyx-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: dailyx-redis, type: redis, property: connectionString }
      # The worker loads the same env module as the API, which requires JWT_SECRET
      # even though the worker never verifies tokens — reuse the API's value so
      # the process doesn't fail config validation on boot.
      - key: JWT_SECRET
        fromService: { name: dailyx-api, type: web, envVarKey: JWT_SECRET }
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_FROM
        sync: false
      - key: MAILGUN_BASE_URL
        value: https://api.mailgun.net   # use https://api.eu.mailgun.net for EU keys
